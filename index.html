<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Personal File Vault</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #0f0f0f; 
      color: #00ff00; 
      text-align: center; 
      padding: 20px; 
    }
    h1 { color: #00ff00; }
    button, input { 
      padding: 12px; 
      margin: 8px; 
      font-size: 16px; 
      border-radius: 8px; 
    }
    .file-item { 
      background: #222; 
      padding: 12px; 
      margin: 10px auto; 
      max-width: 700px; 
      border-radius: 8px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
    }
    .login-btn { background: #4285f4; color: white; }
    .upload-btn { background: #00aa00; color: white; }
  </style>
</head>
<body>
  <h1>🚀 My Personal File Vault</h1>

  <!-- Email Login Section -->
  <h2>Email se Login / Sign Up</h2>
  <input type="email" id="email" placeholder="tumhara@email.com" style="width:280px">
  <input type="password" id="password" placeholder="Password (minimum 6 characters)" style="width:220px">
  <br>
  <button onclick="signUp()">Sign Up</button>
  <button onclick="signIn()">Sign In</button>
  <button onclick="logout()">Logout</button>

  <hr style="margin: 30px auto; max-width: 600px;">

  <!-- File Upload Section -->
  <input type="file" id="fileInput" multiple>
  <button class="upload-btn" onclick="uploadFiles()">Upload Files</button>

  <!-- Files List -->
  <div id="fileList" style="margin-top: 40px; text-align: left; max-width: 700px; margin: 40px auto;"></div>

  <script>
    // ================== CONFIG ==================
    const supabaseUrl = 'https://movdapggqarxxjyytdcb.supabase.co';
    
    // ←←← YAHAN APNI POORI PUBLISHABLE KEY PASTE KARO ←←←
    const supabaseAnonKey = 'sb_publishable_RfoE7wRsU54YvyKA8JLfKg_zPlHIPKh';

    const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);

    let currentUser = null;

    // Sign Up
    async function signUp() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) return alert("Email aur Password daalo");

      const { error } = await supabase.auth.signUp({ email, password });
      if (error) alert("Sign Up Error: " + error.message);
      else alert("Sign Up successful! Ab Sign In karo.");
    }

    // Sign In
    async function signIn() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) return alert("Email aur Password daalo");

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) alert("Sign In Error: " + error.message);
    }

    // Logout
    async function logout() {
      await supabase.auth.signOut();
      currentUser = null;
      document.getElementById('fileList').innerHTML = '';
      alert('Logout ho gaya');
    }

    // Upload Files
    async function uploadFiles() {
      if (!currentUser) return alert("Pehle Sign In karo bhai!");

      const files = document.getElementById('fileInput').files;
      if (files.length === 0) return alert("Koi file select nahi ki!");

      for (let file of files) {
        const filePath = `${currentUser.id}/${file.name}`;

        const { error } = await supabase.storage
          .from('user-files')
          .upload(filePath, file, { upsert: true });

        if (error) console.error("Upload error:", error);
      }

      alert("✅ Files upload ho gayi!");
      loadFiles();
    }

    // Load Files
    async function loadFiles() {
      if (!currentUser) return;

      const fileListDiv = document.getElementById('fileList');
      fileListDiv.innerHTML = '<h2>Ter i Files:</h2>';

      const { data, error } = await supabase.storage
        .from('user-files')
        .list(currentUser.id);

      if (error) {
        console.error(error);
        return;
      }

      for (let file of data) {
        const { data: urlData } = supabase.storage
          .from('user-files')
          .getPublicUrl(`${currentUser.id}/${file.name}`);

        const div = document.createElement('div');
        div.className = 'file-item';
        div.innerHTML = `
          <span>${file.name}</span>
          <a href="${urlData.publicUrl}" target="_blank" download>📥 Download</a>
        `;
        fileListDiv.appendChild(div);
      }
    }

    // Auto check login
    supabase.auth.onAuthStateChange((event, session) => {
      if (session?.user) {
        currentUser = session.user;
        loadFiles();
      }
    });
  </script>
</body>
</html>
